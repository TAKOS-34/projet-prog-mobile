services:
    backend:
        build: .
        ports:
            - "8080:8080"
        env_file:
            - .env
        depends_on:
            - db

    db:
        image: postgis/postgis:16-3.4-alpine
        env_file:
            - .env
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data

volumes:
    postgres_data: